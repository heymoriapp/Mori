name: Mori
options:
  bundleIdPrefix: app.heymori
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""            # ← set your Apple Team ID (or configure signing in Xcode)
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO          # Mori is NOT sandboxed: it needs cross-app Accessibility + CGEvent posting
    COMBINE_HIDPI_IMAGES: YES

targets:
  Mori:
    type: application
    platform: macOS
    sources:
      - path: Mori
    settings:
      base:
        INFOPLIST_FILE: Mori/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Mori/Resources/Mori.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: app.heymori.Mori
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
